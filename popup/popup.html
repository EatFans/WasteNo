<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Wasteno - 别水了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
        }

        .header {
            padding: 16px;
            background: #4A90E2;
            color: white;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #4A90E2;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .button:hover {
            background: #3a7bc8;
        }

        .button:active {
            transform: scale(0.98);
        }

        .message {
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        .tip {
            padding: 12px;
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            border-radius: 4px;
            font-size: 13px;
            color: #856404;
            margin-top: 12px;
        }

        #result {
            margin-top: 12px;
            padding: 12px;
            background: #e8f4f8;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            word-wrap: break-word;
            display: none;
        }

        #result.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Wasteno - 别水了</h1>
    </div>

    <div class="content">
        <div class="section">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value">0</div>
                    <div class="stat-label">今日专注</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">0</div>
                    <div class="stat-label">拦截次数</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">快速操作</div>
            <button id="btn" class="button">
                获取当前页面标题
            </button>
            <div id="result"></div>
        </div>

        <div class="section">
            <div class="message">
                保持专注，别浪费时间！
            </div>
            <div class="tip">
                💡 提示：点击扩展图标即可快速访问此面板
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
