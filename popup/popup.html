<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Wasteno - 别水了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            min-height: 400px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
        }

        .header {
            padding: 16px;
            background: #4A90E2;
            color: white;
        }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .content {
            padding: 20px;
        }

        .section {
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #4A90E2;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .button:hover {
            background: #3a7bc8;
        }

        .button:active {
            transform: scale(0.98);
        }

        .message {
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            text-align: center;
            line-height: 1.6;
        }

        .tip {
            padding: 12px;
            background: #fff3cd;
            border-left: 3px solid #ffc107;
            border-radius: 4px;
            font-size: 13px;
            color: #856404;
            margin-top: 12px;
        }

        #result {
            margin-top: 12px;
            padding: 12px;
            background: #e8f4f8;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            word-wrap: break-word;
            display: none;
        }

        #result.show {
            display: block;
        }

        /* Switch 开关样式 */
        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f5f7fa;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .setting-item:hover {
            background: #e8f0f8;
        }

        .setting-label {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .setting-description {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4A90E2;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        .slider:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Wasteno - 别水了</h1>
    </div>

    <div class="content">
        <div class="section">
            <div class="section-title">反制设置</div>
            <div class="settings-group">
                <!-- 反制禁用复制 -->
                <div class="setting-item">
                    <div>
                        <div class="setting-label">反制禁用复制</div>
                        <div class="setting-description">允许在禁止复制的网页上复制内容</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="antiCopyDisable" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- 反制禁止粘贴 -->
                <div class="setting-item">
                    <div>
                        <div class="setting-label">反制禁止粘贴</div>
                        <div class="setting-description">允许在禁止粘贴的网页上粘贴内容</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="antiPasteDisable" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- 反制切屏检查 -->
                <div class="setting-item">
                    <div>
                        <div class="setting-label">反制切屏检查</div>
                        <div class="setting-description">防止网页检测你切换窗口或标签</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="antiSwitchDetect" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">开发者选项</div>
            <div class="settings-group">
                <!-- 控制台日志 -->
                <div class="setting-item">
                    <div>
                        <div class="setting-label">控制台日志</div>
                        <div class="setting-description">在控制台输出详细的调试信息</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="enableConsoleLog">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="tip">
            这些设置会实时生效，刷新页面后即可使用
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
